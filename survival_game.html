<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Survie</title>
<style>*{margin:0;padding:0;box-sizing:border-box;touch-action:none}body{background:#000;overflow:hidden}canvas{display:block}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const CW=window.innerWidth,CH=window.innerHeight;
const T=64,MW=36,MH=36;
const TL={GRASS:0,DARK:1,DIRT:2,WATER:3,STONE:4,SNOW:5};
const ET={TREE:0,PINE:1,ROCK:2,BROCK:3,BUSH:4};
const ST={WALL:1,FLOOR:2,FIRE:3};
const EN={WOLF:0,SKEL:1,GOB:2};
const ITEMS={
  wood:{name:'Bois',stack:99},stone:{name:'Pierre',stack:99},fiber:{name:'Fibre',stack:99},
  food:{name:'Baies',stack:20},bone:{name:'Os',stack:20},hide:{name:'Cuir',stack:20},
  axe:{name:'Hache',stack:1},pickaxe:{name:'Pioche',stack:1},sword:{name:'Épée',stack:1},
  wall_item:{name:'Mur',stack:20},floor_item:{name:'Sol',stack:20},campfire_item:{name:'Feu',stack:5},
};
const RECIPES=[
  {result:'axe',qty:1,needs:{wood:5,stone:3}},{result:'pickaxe',qty:1,needs:{wood:5,stone:5}},
  {result:'sword',qty:1,needs:{wood:3,stone:8}},{result:'wall_item',qty:4,needs:{wood:8}},
  {result:'floor_item',qty:4,needs:{wood:4}},{result:'campfire_item',qty:1,needs:{wood:6,stone:4}},
];
const BNAME={forest:'Forêt',mountain:'Montagne',snow:'Toundra',plains:'Plaines'};
const rng=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const vlen=(x,y)=>Math.sqrt(x*x+y*y);
const vnorm=(x,y)=>{const l=vlen(x,y)||1;return[x/l,y/l];};
// Deterministic hash for procedural ground details
function ph(x,y){let h=(x*1993+y*2557+x*y*13)|0;h=Math.imul(h^(h>>>16),0x45d9f3b);h=Math.imul(h^(h>>>16),0x45d9f3b);return(h^(h>>>16))>>>0;}

// ── INPUT ──────────────────────────────────────────────────
const Keys={};let prevKeys={};
addEventListener('keydown',e=>{Keys[e.code]=true;if(!['F5','F12','F11'].includes(e.key))e.preventDefault();});
addEventListener('keyup',e=>{Keys[e.code]=false;});
const kp=c=>Keys[c]&&!prevKeys[c];
const JOY={on:false,pid:-1,bx:0,by:0,dx:0,dy:0,R:65};
const ATK={x:CW-80,y:CH-110,r:54,on:false};
const EBTN={x:CW-196,y:CH-108,r:40,on:false};
let atkFire=false,gatherFire=false;
const Mouse={x:0,y:0,down:false,jd:false};
addEventListener('mousemove',e=>{Mouse.x=e.clientX;Mouse.y=e.clientY;});
addEventListener('mousedown',e=>{Mouse.down=true;Mouse.jd=true;});
addEventListener('mouseup',e=>{Mouse.down=false;});
addEventListener('pointerdown',e=>{
  const x=e.clientX,y=e.clientY;
  if(vlen(x-ATK.x,y-ATK.y)<ATK.r+20){ATK.on=true;atkFire=true;}
  else if(vlen(x-EBTN.x,y-EBTN.y)<EBTN.r+20){EBTN.on=true;gatherFire=true;}
  else if(x<CW*0.48&&!JOY.on){JOY.on=true;JOY.pid=e.pointerId;JOY.bx=x;JOY.by=y;JOY.dx=0;JOY.dy=0;}
},{passive:true});
addEventListener('pointermove',e=>{
  if(JOY.on&&e.pointerId===JOY.pid){let dx=e.clientX-JOY.bx,dy=e.clientY-JOY.by;const d=vlen(dx,dy);if(d>JOY.R){dx=dx/d*JOY.R;dy=dy/d*JOY.R;}JOY.dx=dx/JOY.R;JOY.dy=dy/JOY.R;}
},{passive:true});
addEventListener('pointerup',e=>{if(JOY.on&&e.pointerId===JOY.pid){JOY.on=false;JOY.dx=0;JOY.dy=0;}ATK.on=false;EBTN.on=false;},{passive:true});

// ── INVENTORY ─────────────────────────────────────────────
class Inv{
  constructor(n=24){this.s=Array(n).fill(null);this.sel=0;}
  add(id,q=1){const def=ITEMS[id];if(!def)return;for(const sl of this.s){if(sl?.id===id){const sp=def.stack-sl.qty;if(sp>0){const a=Math.min(sp,q);sl.qty+=a;q-=a;}if(q<=0)return;}}for(let i=0;i<this.s.length;i++){if(!this.s[i]){this.s[i]={id,qty:Math.min(q,def.stack)};q-=this.s[i].qty;if(q<=0)return;}}}
  rem(id,q=1){for(let i=this.s.length-1;i>=0;i--){if(this.s[i]?.id===id){const t=Math.min(this.s[i].qty,q);this.s[i].qty-=t;q-=t;if(this.s[i].qty===0)this.s[i]=null;if(q<=0)return true;}}return false;}
  cnt(id){return this.s.reduce((n,sl)=>n+(sl?.id===id?sl.qty:0),0);}
  cur(){return this.s[this.sel];}
}

// ── MAP ────────────────────────────────────────────────────
class GMap{
  constructor(id,biome,seed){this.id=id;this.biome=biome;this.seed=seed;this.w=MW;this.h=MH;this.tiles=[];this.ents=[];this.structs=[];this.enemies=[];this.exits={};this._gen();}
  _n(x,y){return Math.sin(x*.41+this.seed*6.7)*Math.cos(y*.37+this.seed*3.1);}
  _gen(){for(let y=0;y<this.h;y++){this.tiles[y]=[];for(let x=0;x<this.w;x++)this.tiles[y][x]=this._t(x,y);}this._res();this._spawn();}
  _t(x,y){
    if(x===0||y===0||x===this.w-1||y===this.h-1)return TL.DIRT;
    const n=this._n(x,y);
    if(this.biome==='forest')return n<-.52?TL.WATER:n>.38?TL.DARK:TL.GRASS;
    if(this.biome==='mountain')return n<-.5?TL.WATER:n>.42?TL.STONE:TL.GRASS;
    if(this.biome==='snow')return n<-.44?TL.WATER:TL.SNOW;
    return n<-.6?TL.WATER:TL.GRASS;
  }
  _mhp(t){return[7,7,12,22,3][t]??5;}
  _res(){
    const cnt=this.biome==='forest'?85:55;
    for(let i=0;i<cnt;i++){
      const x=rng(2,this.w-3),y=rng(2,this.h-3);
      if(this.tiles[y]?.[x]===TL.WATER||this.entAt(x,y))continue;
      let type;
      if(this.biome==='forest'){const r=Math.random();type=r<.55?ET.TREE:r<.75?ET.BUSH:ET.ROCK;}
      else if(this.biome==='mountain'){const r=Math.random();type=r<.55?ET.BROCK:r<.8?ET.PINE:ET.ROCK;}
      else if(this.biome==='snow'){type=Math.random()<.6?ET.PINE:ET.ROCK;}
      else{const r=Math.random();type=r<.3?ET.TREE:r<.55?ET.BUSH:ET.ROCK;}
      const mhp=this._mhp(type);this.ents.push({x,y,type,hp:mhp,maxHp:mhp,dead:false,shk:0});
    }
  }
  _spawn(){
    const types=this.biome==='snow'?[EN.WOLF,EN.SKEL]:this.biome==='mountain'?[EN.SKEL,EN.GOB]:[EN.WOLF,EN.GOB];
    for(let i=0;i<7;i++){
      let ex,ey,tries=0;
      do{ex=rng(4,this.w-5);ey=rng(4,this.h-5);tries++;}while(this.tiles[ey]?.[ex]===TL.WATER&&tries<20);
      this.enemies.push(new Enemy(ex*T+T/2,ey*T+T/2,types[rng(0,types.length-1)]));
    }
  }
  entAt(tx,ty){return this.ents.find(e=>!e.dead&&e.x===tx&&e.y===ty)??null;}
  strAt(tx,ty){return this.structs.find(s=>s.x===tx&&s.y===ty)??null;}
  walk(px,py){
    const tx=Math.floor(px/T),ty=Math.floor(py/T);
    if(tx<0||ty<0||tx>=this.w||ty>=this.h)return false;
    if(this.tiles[ty]?.[tx]===TL.WATER)return false;
    if(this.entAt(tx,ty))return false;
    const s=this.strAt(tx,ty);if(s&&s.type===ST.WALL)return false;
    return true;
  }
  // Find a safe non-water spawn tile near center
  findSpawn(){
    const cx=Math.floor(this.w/2),cy=Math.floor(this.h/2);
    for(let r=0;r<15;r++){
      for(let a=0;a<Math.max(1,r*8);a++){
        const angle=a/Math.max(1,r*8)*Math.PI*2;
        const x=Math.round(cx+Math.cos(angle)*r),y=Math.round(cy+Math.sin(angle)*r);
        if(x>=2&&y>=2&&x<this.w-2&&y<this.h-2&&this.tiles[y]?.[x]!==TL.WATER&&this.tiles[y]?.[x]!==TL.DIRT)
          return{x:x*T+T/2,y:y*T+T/2};
      }
    }
    return{x:cx*T+T/2,y:cy*T+T/2};
  }
}

// ── ENEMY ──────────────────────────────────────────────────
class Enemy{
  constructor(x,y,type){this.x=x;this.y=y;this.type=type;const S=[{hp:35,spd:125,dmg:8,ar:1.1,agro:215,name:'Loup'},{hp:55,spd:75,dmg:14,ar:1.7,agro:265,name:'Squelette'},{hp:28,spd:108,dmg:6,ar:1.0,agro:198,name:'Gobelin'}][type];Object.assign(this,S);this.maxHp=this.hp;this.dead=false;this.ac=0;this.wt=rng(2,5);this.wx=0;this.wy=0;this.flash=0;this.shk=0;}
}

// ── PARTICLES ─────────────────────────────────────────────
const PARTS=[];
function fx(x,y,col,n=5,spd=90,sz=5){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=spd*(.5+Math.random());PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rng(20,55),life:.8+Math.random()*.3,ml:1.1,col,sz:rng(2,sz)});}}

// ── STATE ─────────────────────────────────────────────────
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
canvas.width=CW;canvas.height=CH;
const maps={};let mapId=0;
const P={x:0,y:0,w:26,h:26,spd:215,hp:100,mhp:100,hunger:100,mhunger:100,inv:new Inv(24),facing:{x:0,y:1},af:0,at2:0,mov:false,ac:0,ar:.38,lv:1,xp:0,xpn:50,swing:0};
const cam={x:0,y:0};
let gt=0,day=0,showInv=false,showCraft=false,bmode=null,notif=null,lt=0;

// ── WORLD ─────────────────────────────────────────────────
function mkWorld(){
  maps[0]=new GMap(0,'forest',1);maps[1]=new GMap(1,'plains',2);
  maps[2]=new GMap(2,'mountain',3);maps[3]=new GMap(3,'snow',4);
  maps[4]=new GMap(4,'forest',5);maps[5]=new GMap(5,'mountain',6);
  maps[0].exits={east:1,south:4};maps[1].exits={west:0,east:2};
  maps[2].exits={west:1,south:3};maps[3].exits={north:2,west:5};
  maps[4].exits={north:0};maps[5].exits={east:3};
  const sp=maps[0].findSpawn();P.x=sp.x;P.y=sp.y;
}
const cm=()=>maps[mapId];
const note=(t)=>{notif={txt:t,ti:2.6};};

// ── UPDATE ────────────────────────────────────────────────
function update(dt){
  gt+=dt;day=(gt%300)/300;
  updP(dt);updEn(dt);
  for(let i=PARTS.length-1;i>=0;i--){const p=PARTS[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;if(p.life<=0)PARTS.splice(i,1);}
  if(notif){notif.ti-=dt;if(notif.ti<=0)notif=null;}
  P.hunger=Math.max(0,P.hunger-dt*.35);
  if(P.hunger===0)P.hp=Math.max(0,P.hp-dt*1.2);
  else if(P.hunger>60)P.hp=Math.min(P.mhp,P.hp+dt*.4);
  if(P.swing>0)P.swing=Math.max(0,P.swing-dt*5);
  atkFire=false;gatherFire=false;Mouse.jd=false;prevKeys={...Keys};
}
function updP(dt){
  const map=cm();
  if(kp('KeyI')){showInv=!showInv;showCraft=false;bmode=null;}
  if(kp('KeyC')){showCraft=!showCraft;showInv=false;bmode=null;}
  if(kp('Escape')){showInv=false;showCraft=false;bmode=null;}
  for(let i=0;i<8;i++)if(kp(`Digit${i+1}`))P.inv.sel=i;
  if(showInv||showCraft)return;
  if(bmode){if(Mouse.jd||atkFire)placeB(map);if(kp('KeyB'))bmode=null;return;}
  let dx=0,dy=0;
  if(Keys['KeyW']||Keys['ArrowUp'])dy-=1;if(Keys['KeyS']||Keys['ArrowDown'])dy+=1;
  if(Keys['KeyA']||Keys['ArrowLeft'])dx-=1;if(Keys['KeyD']||Keys['ArrowRight'])dx+=1;
  if(JOY.on&&(Math.abs(JOY.dx)>.03||Math.abs(JOY.dy)>.03)){dx=JOY.dx;dy=JOY.dy;}
  const dl=vlen(dx,dy);if(dl>1){dx/=dl;dy/=dl;}
  P.mov=dl>.03;
  if(P.mov){
    if(Math.abs(dx)>.08)P.facing.x=Math.sign(dx);if(Math.abs(dy)>.08)P.facing.y=Math.sign(dy);
    const sp=P.spd*dt,hw=P.w/2-3,hh=P.h/2-3;
    const nx=P.x+dx*sp,ny=P.y+dy*sp;
    if(map.walk(nx-hw,P.y-hh)&&map.walk(nx+hw,P.y-hh)&&map.walk(nx-hw,P.y+hh)&&map.walk(nx+hw,P.y+hh))P.x=nx;
    if(map.walk(P.x-hw,ny-hh)&&map.walk(P.x+hw,ny-hh)&&map.walk(P.x-hw,ny+hh)&&map.walk(P.x+hw,ny+hh))P.y=ny;
    P.at2+=dt;if(P.at2>.13){P.at2=0;P.af=(P.af+1)%4;}
  }
  cam.x=P.x-CW/2;cam.y=P.y-CH/2;
  chkTr(map);P.ac=Math.max(0,P.ac-dt);
  const doA=kp('Space')||atkFire||(Mouse.down&&P.ac===0&&Mouse.x>CW*.45);
  if(doA&&P.ac===0)doAtk(map);
  if((Keys['KeyE']&&P.ac===0)||gatherFire)doGather(map);
  if(kp('KeyF')){const s=P.inv.cur();if(s?.id==='food'){P.inv.rem('food',1);P.hunger=Math.min(100,P.hunger+35);P.hp=Math.min(100,P.hp+8);note('+35 Faim  +8 HP');}}
  if(kp('KeyB')){const s=P.inv.cur();if(s&&['wall_item','floor_item','campfire_item'].includes(s.id)){bmode=s.id;note('Mode construction — clic pour placer');}}
}
function doAtk(map){
  const tool=P.inv.cur(),sw=tool?.id==='sword';P.ac=P.ar;P.swing=1;
  const dmg=sw?15:5,range=sw?88:55;
  for(const en of map.enemies){if(en.dead)continue;const dx=en.x-P.x,dy=en.y-P.y;if(vlen(dx,dy)<range+20){en.hp-=dmg;en.flash=.35;en.shk=.25;fx(en.x,en.y,'#c00',6,80,5);if(en.hp<=0){en.dead=true;if(en.type===EN.WOLF)P.inv.add('hide',rng(1,2));if(en.type===EN.SKEL){P.inv.add('bone',rng(1,3));P.inv.add('stone',rng(0,2));}if(en.type===EN.GOB){P.inv.add('fiber',rng(1,3));P.inv.add('food',rng(0,2));}xpGain(12);fx(en.x,en.y,'#FFD700',14,120,7);note(en.name+' éliminé!');}}}
}
function doGather(map){
  const tx=Math.round((P.x+P.facing.x*T*1.1)/T),ty=Math.round((P.y+P.facing.y*T*1.1)/T);
  const e=map.entAt(tx,ty),tool=P.inv.cur();if(!e)return;
  let dmg=1,ok=false;
  if(e.type===ET.TREE||e.type===ET.PINE){if(tool?.id!=='axe'){note('Besoin d\'une hache!');return;}dmg=2;ok=true;}
  else if(e.type===ET.ROCK||e.type===ET.BROCK){if(tool?.id!=='pickaxe'){note('Besoin d\'une pioche!');return;}dmg=2;ok=true;}
  else if(e.type===ET.BUSH){dmg=1;ok=true;}
  if(!ok)return;
  e.hp-=dmg;e.shk=.2;fx(e.x*T+T/2,e.y*T+T/2,e.type===ET.BUSH?'#3d7a1a':'#8B4513',4,60,5);
  if(e.hp<=0){e.dead=true;fx(e.x*T+T/2,e.y*T+T/2,'#FFD700',10,100,7);
    if(e.type===ET.TREE){const n=rng(3,6);P.inv.add('wood',n);note('+'+n+' Bois');}
    if(e.type===ET.PINE){const n=rng(2,5);P.inv.add('wood',n);note('+'+n+' Bois');}
    if(e.type===ET.ROCK){const n=rng(2,5);P.inv.add('stone',n);note('+'+n+' Pierre');}
    if(e.type===ET.BROCK){const n=rng(4,9);P.inv.add('stone',n);note('+'+n+' Pierre');}
    if(e.type===ET.BUSH){const f=rng(1,3),fd=rng(0,2);P.inv.add('fiber',f);if(fd>0)P.inv.add('food',fd);note('+'+f+' Fibre'+(fd>0?'  +'+fd+' Baies':''));}
  }
  P.ac=P.ar;
}
function xpGain(n){P.xp+=n;if(P.xp>=P.xpn){P.lv++;P.xp-=P.xpn;P.xpn=Math.floor(P.xpn*1.5);P.mhp+=15;P.hp=P.mhp;note('Niveau '+P.lv+'!  +15 PV Max');fx(P.x,P.y,'#FFD700',20,150,8);}}
function placeB(map){
  const wx=cam.x+Mouse.x,wy=cam.y+Mouse.y,tx=Math.floor(wx/T),ty=Math.floor(wy/T);
  if(tx<1||ty<1||tx>=map.w-1||ty>=map.h-1)return;
  if(map.entAt(tx,ty)){note('Obstrué!');return;}if(map.strAt(tx,ty)){note('Déjà construit!');return;}
  if(map.tiles[ty]?.[tx]===TL.WATER){note('Impossible sur l\'eau!');return;}
  const item=P.inv.cur();if(!item||item.id!==bmode){bmode=null;return;}
  const st=bmode==='wall_item'?ST.WALL:bmode==='floor_item'?ST.FLOOR:ST.FIRE;
  map.structs.push({x:tx,y:ty,type:st});P.inv.rem(bmode,1);
  if(P.inv.cnt(bmode)===0){bmode=null;note('Plus de matériaux!');}
}
function chkTr(map){
  const m=T*.75;let nid=null,nx=P.x,ny=P.y;
  if(P.x<m&&map.exits.west!=null){nid=map.exits.west;nx=(map.w-2.5)*T;}
  else if(P.x>(map.w)*T-m&&map.exits.east!=null){nid=map.exits.east;nx=T*2.5;}
  else if(P.y<m&&map.exits.north!=null){nid=map.exits.north;ny=(map.h-2.5)*T;}
  else if(P.y>(map.h)*T-m&&map.exits.south!=null){nid=map.exits.south;ny=T*2.5;}
  if(nid!=null){mapId=nid;P.x=nx;P.y=ny;note('Zone: '+(BNAME[maps[nid].biome]??'?'));}
}
function updEn(dt){
  const map=cm();
  for(const en of map.enemies){
    if(en.dead)continue;en.flash=Math.max(0,en.flash-dt*3);en.shk=Math.max(0,en.shk-dt*4);en.ac=Math.max(0,en.ac-dt);
    const dx=P.x-en.x,dy=P.y-en.y,dist=vlen(dx,dy);
    if(dist<en.agro){
      const[nx,ny]=vnorm(dx,dy),sp=en.spd*dt,map2=cm();
      const ex=en.x+nx*sp,ey=en.y+ny*sp;
      if(map2.walk(ex,en.y))en.x=ex;if(map2.walk(en.x,ey))en.y=ey;
      if(dist<52&&en.ac===0){P.hp=Math.max(0,P.hp-en.dmg);en.ac=en.ar;fx(P.x,P.y,'#c00',4,70,4);}
    } else {
      en.wt-=dt;if(en.wt<=0){const a=Math.random()*Math.PI*2;en.wx=Math.cos(a);en.wy=Math.sin(a);en.wt=rng(2,5);}
      const sp=en.spd*.35*dt,map2=cm();
      const ex=en.x+en.wx*sp,ey=en.y+en.wy*sp;
      if(map2.walk(ex,en.y))en.x=ex;if(map2.walk(en.x,ey))en.y=ey;
    }
  }
}

// ── RENDERING ─────────────────────────────────────────────
// Ground base colors
const GCOL={
  [TL.GRASS]:['#2e5a16','#366820','#3e7226','#2a5212'],
  [TL.DARK]: ['#162e08','#1c3a0c','#122608'],
  [TL.DIRT]: ['#7a5a18','#8a6820','#6a4c10'],
  [TL.WATER]:['#0c3e5e','#104870','#0a3452','#145880'],
  [TL.STONE]:['#424040','#4a4848','#363434'],
  [TL.SNOW]: ['#c0d4ec','#ccddf8','#b8cce4','#d4e4fc'],
};

function render(){
  ctx.clearRect(0,0,CW,CH);
  const map=cm();
  ctx.save();ctx.translate(-cam.x,-cam.y);
  const sx=Math.max(0,Math.floor(cam.x/T)),sy=Math.max(0,Math.floor(cam.y/T));
  const ex=Math.min(map.w,sx+Math.ceil(CW/T)+2),ey=Math.min(map.h,sy+Math.ceil(CH/T)+2);

  // Ground pass
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++)dTile(x,y,map.tiles[y][x]);
  // Detail pass (grass/flowers/pebbles)
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++)dDetail(x,y,map.tiles[y][x]);

  // Campfire warm light on ground
  for(const s of map.structs){if(s.type===ST.FIRE){const grd=ctx.createRadialGradient(s.x*T+T/2,s.y*T+T/2,0,s.x*T+T/2,s.y*T+T/2,T*2.2);grd.addColorStop(0,'rgba(255,160,30,.18)');grd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grd;ctx.fillRect(s.x*T-T*1.5,s.y*T-T*1.5,T*4,T*4);}}

  // Floor structures
  for(const s of map.structs)if(s.type===ST.FLOOR)dStruct(s);

  // Y-sorted entities + enemies + player
  const dl=[];
  for(const e of map.ents)if(!e.dead)dl.push({y:e.y*T+T,fn:()=>dEnt(e)});
  for(const en of map.enemies)if(!en.dead)dl.push({y:en.y,fn:()=>dEnemy(en)});
  dl.push({y:P.y,fn:dPlayer});
  for(const s of map.structs)if(s.type!==ST.FLOOR)dl.push({y:s.y*T+T,fn:()=>dStruct(s)});
  dl.sort((a,b)=>a.y-b.y);for(const d of dl)d.fn();

  // Particles
  for(const p of PARTS){ctx.globalAlpha=Math.max(0,p.life/p.ml);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  if(P.swing>.05){ctx.globalAlpha=P.swing*.25;ctx.fillStyle='#fff8';ctx.beginPath();ctx.arc(P.x,P.y,92,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  if(bmode)dGhost(map);
  ctx.restore();

  // Post-process: warm color grade
  const cg=ctx.createRadialGradient(CW/2,CH/2,CW*.1,CW/2,CH/2,CW*.85);
  cg.addColorStop(0,'rgba(255,200,80,.03)');cg.addColorStop(1,'rgba(0,0,20,.22)');
  ctx.fillStyle=cg;ctx.fillRect(0,0,CW,CH);

  dNight();dHUD();dHotbar();dJoy();dBtns();dMini(map);dDirs(map);
  if(notif)dNotif();if(showInv)dInv();if(showCraft)dCraft();
}

function dTile(x,y,t){
  const cols=GCOL[t]??GCOL[TL.GRASS];
  ctx.fillStyle=cols[(x*13+y*7+ph(x,y)%3)%cols.length];
  ctx.fillRect(x*T,y*T,T,T);
  // Subtle tile edge shading for depth
  if(t!==TL.WATER){ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(x*T,y*T+T-3,T,3);ctx.fillRect(x*T+T-3,y*T,3,T);}
  if(t===TL.WATER){
    const w=Math.sin(gt*1.8+x*.65+y*.45);
    if(w>.2){ctx.fillStyle='rgba(255,255,255,0.11)';ctx.fillRect(x*T+6,y*T+12,18+w*8,3);}
    if(w<-.3){ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(x*T+22,y*T+28,16,2);}
  }
}

function dDetail(tx,ty,tile){
  if(tile===TL.WATER)return;
  const h=ph(tx,ty),wx=tx*T,wy=ty*T;
  if(tile===TL.GRASS||tile===TL.DARK){
    const n=h%5;
    ctx.lineWidth=1.5;
    const gc=tile===TL.DARK?'#1e4a0e':'#336618';
    for(let i=0;i<n;i++){
      const gx=wx+4+(h*(i*37+11)&63)%(T-8);
      const gy=wy+4+(h*(i*53+17)&63)%(T-8);
      const ht=5+(h*(i+1))%5;
      ctx.strokeStyle=gc;
      ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx+(i%3-1)*2,gy-ht);
      ctx.moveTo(gx,gy);ctx.lineTo(gx+2,gy-ht+1);ctx.stroke();
    }
    if((h&0xFF)<55){
      const fx2=wx+6+(h>>4)%(T-12),fy2=wy+6+((h>>8)&63)%(T-12);
      const fc=['#ffe840','#ff80cc','#88ccff','#ffaa44','#ff4466'][h%5];
      ctx.fillStyle=fc;ctx.beginPath();ctx.arc(fx2,fy2,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(fx2,fy2,1.2,0,Math.PI*2);ctx.fill();
    }
  } else if(tile===TL.DIRT){
    if((h&0xFF)<220){
      ctx.fillStyle='rgba(50,30,8,0.3)';
      ctx.beginPath();ctx.ellipse(wx+4+(h>>2)%(T-8),wy+4+(h>>6)%(T-8),2+(h%3),1+(h%2),(h%10)*.3,0,Math.PI*2);ctx.fill();
    }
  } else if(tile===TL.STONE){
    if((h&0xFF)<180){
      ctx.strokeStyle='rgba(20,18,18,0.28)';ctx.lineWidth=1;ctx.beginPath();
      ctx.moveTo(wx+(h>>3)%T,wy+(h>>7)%T);ctx.lineTo(wx+(h>>9)%T,wy+(h>>11)%T);ctx.stroke();
    }
  } else if(tile===TL.SNOW){
    if((h&0xFF)<160){
      ctx.fillStyle='rgba(255,255,255,0.45)';ctx.beginPath();ctx.arc(wx+4+(h>>3)%(T-8),wy+4+(h>>6)%(T-8),1.5,0,Math.PI*2);ctx.fill();
    }
  }
}

function shadow(x,y,rx,ry,a=0.32){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,1)';ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.restore();}

function dEnt(e){
  const wx=e.x*T+T/2,wy=e.y*T+T/2;
  const shk=e.shk>0?Math.sin(e.shk*55)*5:0;
  ctx.save();ctx.translate(wx+shk,wy);
  if(e.type===ET.TREE){
    shadow(2,28,26,9);
    // Roots
    ctx.fillStyle='#2e1204';ctx.beginPath();ctx.moveTo(-5,10);ctx.lineTo(-12,22);ctx.lineTo(-7,10);ctx.fill();
    ctx.beginPath();ctx.moveTo(5,10);ctx.lineTo(12,22);ctx.lineTo(7,10);ctx.fill();
    // Trunk
    ctx.fillStyle='#3e1a08';ctx.fillRect(-5,-2,10,26);
    ctx.fillStyle='#2a1004';ctx.fillRect(-5,-2,3,26);
    ctx.fillStyle='#52260e';ctx.fillRect(-1,-2,2,26);
    // Canopy layers (6 layers, dark to light)
    ctx.fillStyle='#081a04';ctx.beginPath();ctx.arc(1,-4,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#102808';ctx.beginPath();ctx.arc(-2,-8,23,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1c4010';ctx.beginPath();ctx.arc(3,-13,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#285818';ctx.beginPath();ctx.arc(-1,-17,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#366820';ctx.beginPath();ctx.arc(2,-20,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#487c2a';ctx.beginPath();ctx.arc(-1,-23,6,0,Math.PI*2);ctx.fill();
    // Highlight
    ctx.fillStyle='rgba(200,255,150,0.12)';ctx.beginPath();ctx.arc(-4,-24,5,0,Math.PI*2);ctx.fill();
  } else if(e.type===ET.PINE){
    shadow(1,26,18,6);
    ctx.fillStyle='#24100a';ctx.fillRect(-3,6,6,20);
    ctx.fillStyle='#1c0e06';ctx.fillRect(-3,6,2,20);
    // 4 triangle layers
    const layers=[[0,-30,22,10,'#081e06'],[0,-22,17,7,'#123010'],[0,-15,13,5,'#1c4414'],[0,-9,9,3,'#2a5e1c']];
    for(const[lx,ly,lw,lh,lc] of layers){ctx.fillStyle=lc;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+lw,ly+lh*4);ctx.lineTo(lx-lw,ly+lh*4);ctx.closePath();ctx.fill();}
    ctx.fillStyle='rgba(200,255,150,0.1)';ctx.beginPath();ctx.arc(-2,-28,4,0,Math.PI*2);ctx.fill();
  } else if(e.type===ET.ROCK){
    shadow(1,8,19,7);
    ctx.fillStyle='#2a2828';ctx.beginPath();ctx.ellipse(0,5,19,14,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3e3c3c';ctx.beginPath();ctx.ellipse(-2,2,14,10,-.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#525050';ctx.beginPath();ctx.ellipse(-4,-1,7,5,-.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.ellipse(-5,-2,4,3,-.5,0,Math.PI*2);ctx.fill();
    // Crack
    ctx.strokeStyle='rgba(15,14,14,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(2,-2);ctx.lineTo(6,4);ctx.lineTo(4,8);ctx.stroke();
  } else if(e.type===ET.BROCK){
    shadow(2,10,26,9);
    ctx.fillStyle='#222020';ctx.beginPath();ctx.ellipse(0,7,26,18,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#363434';ctx.beginPath();ctx.ellipse(-3,3,18,13,-.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4a4848';ctx.beginPath();ctx.ellipse(-5,-2,10,7,-.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.05)';ctx.beginPath();ctx.ellipse(-6,-3,5,4,-.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(10,10,10,0.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(3,-2);ctx.lineTo(8,5);ctx.lineTo(6,10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-4,6);ctx.stroke();
  } else if(e.type===ET.BUSH){
    shadow(0,12,15,5);
    ctx.fillStyle='#102a06';ctx.beginPath();ctx.arc(0,2,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a4010';ctx.beginPath();ctx.arc(-5,-2,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#266018';ctx.beginPath();ctx.arc(4,-4,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#327820';ctx.beginPath();ctx.arc(-1,-6,7,0,Math.PI*2);ctx.fill();
    // Berries
    const bc=['#cc0a0a','#dd1a1a','#aa0808'];
    for(let i=0;i<5;i++){const bx=Math.cos(i*1.26)*9,by=Math.sin(i*1.26)*8-2;ctx.fillStyle=bc[i%3];ctx.beginPath();ctx.arc(bx,by,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,100,100,0.5)';ctx.beginPath();ctx.arc(bx-1,by-1,1.5,0,Math.PI*2);ctx.fill();}
  }
  if(e.hp<e.maxHp){const bw=40;ctx.fillStyle='#1a0000';ctx.fillRect(-bw/2,-30,bw,5);ctx.fillStyle=e.hp/e.maxHp>.5?'#2ecc71':'#e74c3c';ctx.fillRect(-bw/2,-30,bw*(e.hp/e.maxHp),5);}
  if(e.shk>0)e.shk=Math.max(0,e.shk-.016);
  ctx.restore();
}

    ctx.fillStyle='#3a1818';ctx.beginPath();ctx.moveTo(7,-17);ctx.lineTo(12,-11);ctx.lineTo(6,-9);ctx.closePath();ctx.fill();

    ctx.beginPath();ctx.arc(4,-10,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffee00';ctx.beginPath();ctx.arc(-4,-10,0.8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(4,-10,0.8,0,Math.PI*2);ctx.fill();
    // Teeth
    ctx.fillStyle='#f0eeee';ctx.beginPath();ctx.moveTo(-5,-4);ctx.lineTo(-3,-8);ctx.lineTo(-1,-4);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(1,-4);ctx.lineTo(3,-8);ctx.lineTo(5,-4);ctx.closePath();ctx.fill();
  } else if(en.type===EN.SKEL){
    // Glow aura
    ctx.save();const ag=ctx.createRadialGradient(0,-5,0,0,-5,35);ag.addColorStop(0,'rgba(80,220,220,0.12)');ag.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,-5,35,0,Math.PI*2);ctx.fill();ctx.restore();
    // Bones

    ctx.beginPath();ctx.moveTo(0,16);ctx.lineTo(0,-2);ctx.stroke();
    ctx.lineWidth=3;
    for(let i=0;i<3;i++){const ry=-1+i*5.5;ctx.beginPath();ctx.moveTo(-11,ry);ctx.quadraticCurveTo(0,ry-3,11,ry);ctx.stroke();}
    ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-3,-2);ctx.quadraticCurveTo(-14,5,-16,14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-2);ctx.quadraticCurveTo(14,5,16,14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-4,16);ctx.lineTo(-8,28);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4,16);ctx.lineTo(8,28);ctx.stroke();
    // Pelvis
    ctx.beginPath();ctx.arc(-5,16,4,0,Math.PI*2);ctx.fillStyle='#c8c8c4';ctx.fill();
    ctx.beginPath();ctx.arc(5,16,4,0,Math.PI*2);ctx.fill();
    // Skull
    ctx.fillStyle='#ddddd8';ctx.beginPath();ctx.arc(0,-14,13,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c8c8c4';ctx.beginPath();ctx.arc(0,-14,11,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.ellipse(-4,-15,4,4.5,-.2,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='rgba(180,220,255,0.4)';ctx.fillRect(17,-18,2,20);
  } else {
    // Goblin
    shadow(0,18,14,5,0.3);
    // Body
    ctx.fillStyle='#2a5010';ctx.beginPath();ctx.ellipse(0,6,13,11,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#386618';ctx.beginPath();ctx.ellipse(-1,4,10,8,0,0,Math.PI*2);ctx.fill();
    // Head
    ctx.fillStyle='#346014';ctx.beginPath();ctx.arc(0,-7,13,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#428020';ctx.beginPath();ctx.arc(-1,-8,11,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#2a5010';

    ctx.fillStyle='#2a5010';
    ctx.beginPath();ctx.moveTo(10,-12);ctx.lineTo(20,-5);ctx.lineTo(9,-3);ctx.closePath();ctx.fill();
    ctx.fillStyle='#1e3c0c';ctx.beginPath();ctx.moveTo(10,-11);ctx.lineTo(17,-6);ctx.lineTo(9,-4);ctx.closePath();ctx.fill();

    ctx.beginPath();ctx.arc(3,-8,2,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#2a5010';ctx.beginPath();ctx.arc(0,-4,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a3a0a';ctx.beginPath();ctx.arc(-1.5,-3.5,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(1.5,-3.5,1.5,0,Math.PI*2);ctx.fill();
    // Club
    ctx.fillStyle='#4a2a0c';ctx.fillRect(13,-14,5,22);
    ctx.fillStyle='#3a1e08';ctx.beginPath();ctx.arc(15,-14,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6a4010';ctx.beginPath();ctx.arc(13,-14,4,0,Math.PI*2);ctx.fill();
    // Nails
    ctx.fillStyle='#1a0a04';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(10+i*4,-18,2,0,Math.PI*2);ctx.fill();}
  }
  // HP bar
  const bw=44;
  const barGrd=ctx.createLinearGradient(-bw/2,-32,bw/2,-32);
  barGrd.addColorStop(0,'rgba(0,0,0,.7)');barGrd.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=barGrd;ctx.fillRect(-bw/2,-32,bw,7);
  const hpG=ctx.createLinearGradient(-bw/2,-32,bw*(en.hp/en.maxHp)-bw/2,-32);
  hpG.addColorStop(0,en.hp/en.maxHp>.5?'#1aaa44':'#dd2222');
  hpG.addColorStop(1,en.hp/en.maxHp>.5?'#2eee66':'#ff4444');

  ctx.fillStyle='rgba(255,255,255,.75)';ctx.font='bold 9px Courier New';ctx.textAlign='center';ctx.fillText(en.name,0,-36);
  ctx.restore();
}

function dPlayer(){
  ctx.save();ctx.translate(P.x,P.y);
  const bob=P.mov?Math.sin(P.af*Math.PI/2)*2.5:0;
  const leg=P.mov?Math.sin(P.af*Math.PI/2)*11:0;
  shadow(0,22,15,5,0.3);
  ctx.translate(0,bob);
  // Cloak back
  ctx.fillStyle='#14082e';ctx.beginPath();ctx.moveTo(-14,-6);ctx.lineTo(14,-6);ctx.lineTo(11,20);ctx.lineTo(-11,20);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#2a1060';ctx.lineWidth=1;ctx.stroke();
  // Legs
  ctx.fillStyle='#1e2868';ctx.fillRect(-9,8+leg*.4,8,16);ctx.fillRect(2,8-leg*.4,8,16);

  // Boot buckles
  ctx.fillStyle='#c8a030';ctx.fillRect(-9,23+leg*.4,4,2);ctx.fillRect(2,23-leg*.4,4,2);
  // Armor body
  ctx.fillStyle='#1e1e4a';ctx.fillRect(-12,-12,24,22);
  const bodyGrd=ctx.createLinearGradient(-12,-12,12,-12);
  bodyGrd.addColorStop(0,'#2a2a5e');bodyGrd.addColorStop(0.5,'#3a3a7a');bodyGrd.addColorStop(1,'#22225a');
  ctx.fillStyle=bodyGrd;ctx.fillRect(-10,-10,20,18);
  // Chest emblem
  ctx.fillStyle='#c8a030';ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(5,-3);ctx.lineTo(0,2);ctx.lineTo(-5,-3);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffe060';ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(3,-3);ctx.lineTo(0,0);ctx.lineTo(-3,-3);ctx.closePath();ctx.fill();
  // Belt
  ctx.fillStyle='#1e1006';ctx.fillRect(-12,6,24,5);ctx.fillStyle='#8a6020';ctx.fillRect(-3,6,6,5);ctx.fillStyle='#c8a030';ctx.fillRect(-2,7,4,3);

function dNight(){
  let a=0;
  if(day<.22)a=.7;else if(day<.32)a=.7-(day-.22)/.1*.7;
  else if(day<.68)a=0;else if(day<.78)a=(day-.68)/.1*.7;else a=.7;
  if(a>.01){
    ctx.fillStyle=`rgba(2,4,24,${a})`;ctx.fillRect(0,0,CW,CH);
    if(a>.32){ctx.fillStyle=`rgba(255,255,210,${a*.55})`;for(let i=0;i<40;i++){ctx.fillRect((Math.sin(i*23.7)*CW+CW)/2,(Math.cos(i*17.3)*CH+CH)/2,a>0.5?2:1.5,a>0.5?2:1.5);}}
  }
  // Vignette
  const vg=ctx.createRadialGradient(CW/2,CH/2,CW*.18,CW/2,CH/2,CW*.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.52)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);
  // Clock
  const h=Math.floor(day*24),m=Math.floor((day*24-h)*60),isD=day>.25&&day<.75;
  ctx.fillStyle=isD?'rgba(255,240,130,.9)':'rgba(140,180,255,.9)';
  ctx.font='bold 14px Courier New';ctx.textAlign='center';
  ctx.fillText((isD?'☀ ':'☽ ')+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'),CW/2,22);
}

  for(let y=0;y<map.h;y++)for(let x=0;x<map.w;x++){
    const t=map.tiles[y][x];
    ctx.fillStyle=t===TL.WATER?'#0c3e5e':t===TL.SNOW?'#b8cce0':t===TL.STONE?'#3a3838':t===TL.DARK?'#162e08':'#2a5012';
    ctx.fillRect(mx+x*ts,my+y*ts,Math.ceil(ts),Math.ceil(ts));
  }
  for(const s of map.structs){ctx.fillStyle=s.type===ST.FLOOR?'#7a5010':'#3a2806';ctx.fillRect(mx+s.x*ts,my+s.y*ts,Math.max(2,ts),Math.max(2,ts));}
  for(const en of map.enemies){if(en.dead)continue;ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(mx+en.x/T*ts,my+en.y/T*ts,2,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(mx+P.x/T*ts,my+P.y/T*ts,3.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(180,140,40,.8)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(mx+P.x/T*ts,my+P.y/T*ts,3.5,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(220,190,100,.8)';ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText(BNAME[map.biome]??'Zone',mx+mm/2,my+mm+14);
}
function dDirs(map){
  ctx.font='12px Courier New';ctx.fillStyle='rgba(220,195,120,.65)';
  if(map.exits.north!=null){ctx.textAlign='center';ctx.fillText('▲ '+(BNAME[maps[map.exits.north]?.biome]??'?'),CW/2,40);}
  if(map.exits.south!=null){ctx.textAlign='center';ctx.fillText('▼ '+(BNAME[maps[map.exits.south]?.biome]??'?'),CW/2,CH-5);}
  if(map.exits.west!=null){ctx.textAlign='left';ctx.fillText('◄ '+(BNAME[maps[map.exits.west]?.biome]??'?'),5,CH/2);}
  if(map.exits.east!=null){ctx.textAlign='right';ctx.fillText((BNAME[maps[map.exits.east]?.biome]??'?')+' ►',CW-5,CH/2);}
}
function dNotif(){
  const fd=Math.min(1,notif.ti/.45);ctx.save();ctx.globalAlpha=fd;
  ctx.font='bold 16px Courier New';ctx.textAlign='center';
  const tw=ctx.measureText(notif.txt).width,nx=CW/2-tw/2-16,ny=CH/2-90;
  const ng=ctx.createLinearGradient(nx,ny,nx,ny+34);ng.addColorStop(0,'rgba(20,16,40,.88)');ng.addColorStop(1,'rgba(8,6,20,.92)');
  ctx.fillStyle=ng;rr(nx,ny,tw+32,34,7);ctx.fill();
  ctx.strokeStyle='rgba(200,160,40,.7)';ctx.lineWidth=1.5;rr(nx,ny,tw+32,34,7);ctx.stroke();
  ctx.fillStyle='#FFD700';ctx.fillText(notif.txt,CW/2,ny+22);ctx.restore();
}
function dInv(){
  const iw=440,ih=420,ix=CW/2-iw/2,iy=CH/2-ih/2,sz=52,pad=5;
  panel(ix,iy,iw,ih,10);
  ctx.fillStyle='#d4a840';ctx.font='bold 15px Courier New';ctx.textAlign='center';ctx.fillText('— INVENTAIRE —',CW/2,iy+26);
  ctx.strokeStyle='rgba(180,140,40,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ix+16,iy+34);ctx.lineTo(ix+iw-16,iy+34);ctx.stroke();
  for(let i=0;i<24;i++){
    const col=i%6,row=Math.floor(i/6),sx2=ix+18+col*(sz+pad),sy2=iy+40+row*(sz+pad),sel=i===P.inv.sel;
    const slotG=ctx.createLinearGradient(sx2,sy2,sx2,sy2+sz);slotG.addColorStop(0,sel?'rgba(255,200,50,.16)':'rgba(22,18,38,.85)');slotG.addColorStop(1,sel?'rgba(255,180,30,.1)':'rgba(12,10,22,.9)');
    ctx.fillStyle=slotG;rr(sx2,sy2,sz,sz,4);ctx.fill();
    ctx.strokeStyle=sel?'#FFD700':'rgba(120,90,30,.55)';ctx.lineWidth=sel?2:1;rr(sx2,sy2,sz,sz,4);ctx.stroke();
    if(i<8){ctx.fillStyle='rgba(255,200,50,.2)';ctx.fillRect(sx2,sy2,11,11);ctx.fillStyle='rgba(200,160,30,.8)';ctx.font='8px Courier New';ctx.textAlign='left';ctx.fillText(i+1,sx2+2,sy2+9);}
    const sl=P.inv.s[i];
    if(sl){ico(sl.id,sx2+6,sy2+6,sz-12,sz-12);if(sl.qty>1){ctx.fillStyle='#fff';ctx.font='bold 10px Courier New';ctx.textAlign='right';ctx.fillText(sl.qty,sx2+sz-3,sy2+sz-3);}}
  }
  ctx.fillStyle='rgba(180,150,80,.5)';ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText('[I] Fermer',CW/2,iy+ih-10);
}
function dCraft(){
  const cw2=480,ch2=RECIPES.length*74+68,cx=CW/2-cw2/2,cy=CH/2-ch2/2;
  panel(cx,cy,cw2,ch2,10);
  ctx.fillStyle='#d4a840';ctx.font='bold 15px Courier New';ctx.textAlign='center';ctx.fillText('— FABRICATION —',CW/2,cy+26);
  ctx.strokeStyle='rgba(180,140,40,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx+16,cy+34);ctx.lineTo(cx+cw2-16,cy+34);ctx.stroke();
  for(let i=0;i<RECIPES.length;i++){
    const r=RECIPES[i],ry=cy+44+i*74;
    let ok=true;for(const[id,q] of Object.entries(r.needs))if(P.inv.cnt(id)<q){ok=false;break;}
    const rowG=ctx.createLinearGradient(cx+10,ry,cx+10,ry+64);
    rowG.addColorStop(0,ok?'rgba(12,50,12,.8)':'rgba(50,10,10,.6)');
    rowG.addColorStop(1,ok?'rgba(6,30,6,.85)':'rgba(35,6,6,.65)');
    ctx.fillStyle=rowG;rr(cx+10,ry,cw2-20,64,5);ctx.fill();
    ctx.strokeStyle=ok?'rgba(50,170,50,.5)':'rgba(100,30,30,.45)';ctx.lineWidth=1;rr(cx+10,ry,cw2-20,64,5);ctx.stroke();
    ico(r.result,cx+16,ry+12,40,40);
    const def=ITEMS[r.result];
    ctx.fillStyle=ok?'#e8e4d8':'#888';ctx.font='bold 13px Courier New';ctx.textAlign='left';ctx.fillText((def?.name??r.result)+' ×'+r.qty,cx+64,ry+23);
    ctx.font='11px Courier New';let nx2=cx+64;
    for(const[id,q] of Object.entries(r.needs)){const h=P.inv.cnt(id);ctx.fillStyle=h>=q?'#2ecc71':'#e74c3c';ctx.fillText((ITEMS[id]?.name??id)+': '+h+'/'+q,nx2,ry+45);nx2+=118;}
    if(ok){
      const bx=cx+cw2-104,by=ry+16,hov=Mouse.x>=bx&&Mouse.x<=bx+84&&Mouse.y>=by&&Mouse.y<=by+32;
      const bg2=ctx.createLinearGradient(bx,by,bx,by+32);bg2.addColorStop(0,hov?'#4cd964':'#2ecc71');bg2.addColorStop(1,hov?'#38c050':'#22aa5a');
      ctx.fillStyle=bg2;rr(bx,by,84,32,6);ctx.fill();
      ctx.fillStyle='#000';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.fillText('Fabriquer',bx+42,by+21);
      if(hov&&Mouse.jd){for(const[id,q] of Object.entries(r.needs))P.inv.rem(id,q);P.inv.add(r.result,r.qty);note('Fabriqué: '+(def?.name)+' ×'+r.qty);}
    }
  }
  ctx.fillStyle='rgba(180,150,80,.5)';ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText('[C] Fermer',CW/2,cy+ch2-10);
}

// ── LOOP ──────────────────────────────────────────────────
function loop(ts){const dt=Math.min((ts-lt)/1000,.1);lt=ts;update(dt);render();requestAnimationFrame(loop);}
mkWorld();
P.inv.add('axe',1);P.inv.add('wood',12);P.inv.add('stone',6);
requestAnimationFrame(ts=>{lt=ts;requestAnimationFrame(loop);});
</script>
</body>
