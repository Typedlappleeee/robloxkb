<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Survie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#000;overflow:hidden;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const CW=window.innerWidth, CH=window.innerHeight;
const T=64, MW=34, MH=34;

// Tile / entity / struct types
const TL={GRASS:0,DARK:1,DIRT:2,WATER:3,STONE:4,SNOW:5};
const ET={TREE:0,PINE:1,ROCK:2,BROCK:3,BUSH:4};
const ST={WALL:1,FLOOR:2,FIRE:3};
const EN={WOLF:0,SKEL:1,GOB:2};

const ITEMS={
  wood:{name:'Bois',stack:99},stone:{name:'Pierre',stack:99},
  fiber:{name:'Fibre',stack:99},food:{name:'Baies',stack:20},
  bone:{name:'Os',stack:20},hide:{name:'Cuir',stack:20},
  axe:{name:'Hache',stack:1},pickaxe:{name:'Pioche',stack:1},
  sword:{name:'Épée',stack:1},
  wall_item:{name:'Mur',stack:20},floor_item:{name:'Sol',stack:20},
  campfire_item:{name:'Feu',stack:5},
};
const RECIPES=[
  {result:'axe',qty:1,needs:{wood:5,stone:3}},
  {result:'pickaxe',qty:1,needs:{wood:5,stone:5}},
  {result:'sword',qty:1,needs:{wood:3,stone:8}},
  {result:'wall_item',qty:4,needs:{wood:8}},
  {result:'floor_item',qty:4,needs:{wood:4}},
  {result:'campfire_item',qty:1,needs:{wood:6,stone:4}},
];
const BNAME={forest:'Forêt',mountain:'Montagne',snow:'Toundra',plains:'Plaines'};

const rng=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const vlen=(x,y)=>Math.sqrt(x*x+y*y);
const vnorm=(x,y)=>{const l=vlen(x,y)||1;return[x/l,y/l];};

// ── INPUT ──────────────────────────────────────────────────
const Keys={};let prevKeys={};
addEventListener('keydown',e=>{Keys[e.code]=true;if(!['F5','F12','F11'].includes(e.key))e.preventDefault();});
addEventListener('keyup',e=>{Keys[e.code]=false;});
const kp=c=>Keys[c]&&!prevKeys[c];

const JOY={on:false,pid:-1,bx:0,by:0,dx:0,dy:0,R:62};
const ATK={x:CW-85,y:CH-115,r:52,on:false};
const EBTN={x:CW-195,y:CH-105,r:38,on:false};
let atkFire=false,gatherFire=false;
const Mouse={x:0,y:0,down:false,jd:false};

addEventListener('mousemove',e=>{Mouse.x=e.clientX;Mouse.y=e.clientY;});
addEventListener('mousedown',e=>{Mouse.down=true;Mouse.jd=true;});
addEventListener('mouseup',e=>{Mouse.down=false;});

addEventListener('pointerdown',e=>{
  const x=e.clientX,y=e.clientY;
  const adx=x-ATK.x,ady=y-ATK.y;
  const edx=x-EBTN.x,edy=y-EBTN.y;
  if(vlen(adx,ady)<ATK.r+16){ATK.on=true;atkFire=true;}
  else if(vlen(edx,edy)<EBTN.r+16){EBTN.on=true;gatherFire=true;}
  else if(x<CW*0.45&&!JOY.on){JOY.on=true;JOY.pid=e.pointerId;JOY.bx=x;JOY.by=y;JOY.dx=0;JOY.dy=0;}
},{passive:true});
addEventListener('pointermove',e=>{
  if(JOY.on&&e.pointerId===JOY.pid){
    let dx=e.clientX-JOY.bx,dy=e.clientY-JOY.by;
    const d=vlen(dx,dy);
    if(d>JOY.R){dx=dx/d*JOY.R;dy=dy/d*JOY.R;}
    JOY.dx=dx/JOY.R;JOY.dy=dy/JOY.R;
  }
},{passive:true});
addEventListener('pointerup',e=>{
  if(JOY.on&&e.pointerId===JOY.pid){JOY.on=false;JOY.dx=0;JOY.dy=0;}
  ATK.on=false;EBTN.on=false;
},{passive:true});

// ── INVENTORY ─────────────────────────────────────────────
class Inv{
  constructor(n=24){this.s=Array(n).fill(null);this.sel=0;}
  add(id,q=1){
    const def=ITEMS[id];if(!def)return;
    for(const sl of this.s){if(sl?.id===id){const sp=def.stack-sl.qty;if(sp>0){const a=Math.min(sp,q);sl.qty+=a;q-=a;}if(q<=0)return;}}
    for(let i=0;i<this.s.length;i++){if(!this.s[i]){this.s[i]={id,qty:Math.min(q,def.stack)};q-=this.s[i].qty;if(q<=0)return;}}
  }
  rem(id,q=1){
    for(let i=this.s.length-1;i>=0;i--){if(this.s[i]?.id===id){const t=Math.min(this.s[i].qty,q);this.s[i].qty-=t;q-=t;if(this.s[i].qty===0)this.s[i]=null;if(q<=0)return true;}}
    return false;
  }
  cnt(id){return this.s.reduce((n,sl)=>n+(sl?.id===id?sl.qty:0),0);}
  cur(){return this.s[this.sel];}
}

// ── MAP ────────────────────────────────────────────────────
class GMap{
  constructor(id,biome,seed){
    this.id=id;this.biome=biome;this.seed=seed;
    this.w=MW;this.h=MH;
    this.tiles=[];this.ents=[];this.structs=[];this.enemies=[];
    this.exits={};this._gen();
  }
  _n(x,y){return Math.sin(x*.41+this.seed*6.7)*Math.cos(y*.37+this.seed*3.1);}
  _gen(){
    for(let y=0;y<this.h;y++){this.tiles[y]=[];for(let x=0;x<this.w;x++)this.tiles[y][x]=this._t(x,y);}
    this._res();this._spawn();
  }
  _t(x,y){
    if(x===0||y===0||x===this.w-1||y===this.h-1)return TL.DIRT;
    const n=this._n(x,y);
    if(this.biome==='forest')return n<-.52?TL.WATER:n>.38?TL.DARK:TL.GRASS;
    if(this.biome==='mountain')return n<-.5?TL.WATER:n>.42?TL.STONE:TL.GRASS;
    if(this.biome==='snow')return n<-.44?TL.WATER:TL.SNOW;
    return n<-.6?TL.WATER:TL.GRASS;
  }
  _mhp(t){return[7,7,12,22,3][t]??5;}
  _res(){
    const cnt=this.biome==='forest'?85:55;
    for(let i=0;i<cnt;i++){
      const x=rng(2,this.w-3),y=rng(2,this.h-3);
      if(this.tiles[y]?.[x]===TL.WATER||this.entAt(x,y))continue;
      let type;
      if(this.biome==='forest'){const r=Math.random();type=r<.55?ET.TREE:r<.75?ET.BUSH:ET.ROCK;}
      else if(this.biome==='mountain'){const r=Math.random();type=r<.55?ET.BROCK:r<.8?ET.PINE:ET.ROCK;}
      else if(this.biome==='snow'){type=Math.random()<.6?ET.PINE:ET.ROCK;}
      else{const r=Math.random();type=r<.3?ET.TREE:r<.55?ET.BUSH:ET.ROCK;}
      const mhp=this._mhp(type);
      this.ents.push({x,y,type,hp:mhp,maxHp:mhp,dead:false,shk:0});
    }
  }
  _spawn(){
    for(let i=0;i<7;i++){
      const types=this.biome==='snow'?[EN.WOLF,EN.SKEL]:this.biome==='mountain'?[EN.SKEL,EN.GOB]:[EN.WOLF,EN.GOB];
      const t=types[rng(0,types.length-1)];
      this.enemies.push(new Enemy(rng(5,this.w-5)*T,rng(5,this.h-5)*T,t));
    }
  }
  entAt(tx,ty){return this.ents.find(e=>!e.dead&&e.x===tx&&e.y===ty)??null;}
  strAt(tx,ty){return this.structs.find(s=>s.x===tx&&s.y===ty)??null;}
  walk(px,py){
    const tx=Math.floor(px/T),ty=Math.floor(py/T);
    if(tx<0||ty<0||tx>=this.w||ty>=this.h)return false;
    if(this.tiles[ty]?.[tx]===TL.WATER)return false;
    if(this.entAt(tx,ty))return false;
    const s=this.strAt(tx,ty);if(s&&s.type===ST.WALL)return false;
    return true;
  }
}

// ── ENEMY ──────────────────────────────────────────────────
class Enemy{
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;
    const S=[
      {hp:35,spd:125,dmg:8,ar:1.1,agro:210,name:'Loup'},
      {hp:55,spd:75,dmg:14,ar:1.7,agro:260,name:'Squelette'},
      {hp:28,spd:105,dmg:6,ar:1.0,agro:195,name:'Gobelin'},
    ][type];
    Object.assign(this,S);this.maxHp=this.hp;
    this.dead=false;this.ac=0;this.wt=rng(2,5);this.wx=0;this.wy=0;
    this.flash=0;this.shk=0;
  }
}

// ── PARTICLES ─────────────────────────────────────────────
const PARTS=[];
function fx(x,y,col,n=5,spd=90,sz=5){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=spd*(.5+Math.random());
    PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rng(20,55),life:.8+Math.random()*.3,ml:1.1,col,sz:rng(2,sz)});
  }
}

// ── GAME STATE ─────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=CW;canvas.height=CH;

const maps={};let mapId=0;
const P={
  x:MW/2*T,y:MH/2*T,w:26,h:26,spd:215,
  hp:100,mhp:100,hunger:100,mhunger:100,
  inv:new Inv(24),facing:{x:0,y:1},
  af:0,at2:0,mov:false,ac:0,ar:.38,
  lv:1,xp:0,xpn:50,swing:0,
};
const cam={x:0,y:0};
let gt=0,day=0,showInv=false,showCraft=false,bmode=null,notif=null,lt=0;

// ── WORLD ─────────────────────────────────────────────────
function mkWorld(){
  maps[0]=new GMap(0,'forest',1);maps[1]=new GMap(1,'plains',2);
  maps[2]=new GMap(2,'mountain',3);maps[3]=new GMap(3,'snow',4);
  maps[4]=new GMap(4,'forest',5);maps[5]=new GMap(5,'mountain',6);
  maps[0].exits={east:1,south:4};maps[1].exits={west:0,east:2};
  maps[2].exits={west:1,south:3};maps[3].exits={north:2,west:5};
  maps[4].exits={north:0};maps[5].exits={east:3};
}
const cm=()=>maps[mapId];
const note=(t)=>{notif={txt:t,ti:2.6};};

// ── UPDATE ────────────────────────────────────────────────
function update(dt){
  gt+=dt;day=(gt%300)/300;
  updPlayer(dt);updEnemies(dt);
  for(let i=PARTS.length-1;i>=0;i--){const p=PARTS[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;if(p.life<=0)PARTS.splice(i,1);}
  if(notif){notif.ti-=dt;if(notif.ti<=0)notif=null;}
  P.hunger=Math.max(0,P.hunger-dt*.35);
  if(P.hunger===0)P.hp=Math.max(0,P.hp-dt*1.2);
  else if(P.hunger>60)P.hp=Math.min(P.mhp,P.hp+dt*.4);
  if(P.swing>0)P.swing=Math.max(0,P.swing-dt*5);
  atkFire=false;gatherFire=false;Mouse.jd=false;prevKeys={...Keys};
}

function updPlayer(dt){
  const map=cm();
  if(kp('KeyI')){showInv=!showInv;showCraft=false;bmode=null;}
  if(kp('KeyC')){showCraft=!showCraft;showInv=false;bmode=null;}
  if(kp('Escape')){showInv=false;showCraft=false;bmode=null;}
  for(let i=0;i<8;i++)if(kp(`Digit${i+1}`))P.inv.sel=i;
  if(showInv||showCraft)return;
  if(bmode){if(Mouse.jd||atkFire)place(map);if(kp('KeyB'))bmode=null;return;}

  // Direction
  let dx=0,dy=0;
  if(Keys['KeyW']||Keys['ArrowUp'])dy-=1;
  if(Keys['KeyS']||Keys['ArrowDown'])dy+=1;
  if(Keys['KeyA']||Keys['ArrowLeft'])dx-=1;
  if(Keys['KeyD']||Keys['ArrowRight'])dx+=1;
  if(JOY.on&&(Math.abs(JOY.dx)>.05||Math.abs(JOY.dy)>.05)){dx=JOY.dx;dy=JOY.dy;}
  const dl=vlen(dx,dy);if(dl>1){dx/=dl;dy/=dl;}
  P.mov=dl>.05;
  if(P.mov){
    if(Math.abs(dx)>.1)P.facing.x=Math.sign(dx);
    if(Math.abs(dy)>.1)P.facing.y=Math.sign(dy);
    const spd=P.spd*dt,hw=P.w/2-3,hh=P.h/2-3;
    const nx=P.x+dx*spd,ny=P.y+dy*spd;
    if(map.walk(nx-hw,P.y-hh)&&map.walk(nx+hw,P.y-hh)&&map.walk(nx-hw,P.y+hh)&&map.walk(nx+hw,P.y+hh))P.x=nx;
    if(map.walk(P.x-hw,ny-hh)&&map.walk(P.x+hw,ny-hh)&&map.walk(P.x-hw,ny+hh)&&map.walk(P.x+hw,ny+hh))P.y=ny;
    P.at2+=dt;if(P.at2>.13){P.at2=0;P.af=(P.af+1)%4;}
  }

  // Instant camera — fixes the "doesn't move" feel
  cam.x=P.x-CW/2;cam.y=P.y-CH/2;

  chkTrans(map);
  P.ac=Math.max(0,P.ac-dt);

  const doAtk=kp('Space')||atkFire||(Mouse.down&&P.ac===0&&Mouse.x>CW*.45);
  if(doAtk&&P.ac===0)doAttack(map);
  if(Keys['KeyE']&&P.ac===0||gatherFire)doGather(map);
  if(kp('KeyF')){const s=P.inv.cur();if(s?.id==='food'){P.inv.rem('food',1);P.hunger=Math.min(100,P.hunger+35);P.hp=Math.min(100,P.hp+8);note('+35 Faim +8 HP');}}
  if(kp('KeyB')){const s=P.inv.cur();if(s&&['wall_item','floor_item','campfire_item'].includes(s.id)){bmode=s.id;note('Mode construction — clic pour placer');}}
}

function doAttack(map){
  const tool=P.inv.cur(),hasSword=tool?.id==='sword';
  const dmg=hasSword?15:5,range=hasSword?85:55;
  P.ac=P.ar;P.swing=1;
  for(const en of map.enemies){
    if(en.dead)continue;
    const dx=en.x-P.x,dy=en.y-P.y;
    if(vlen(dx,dy)<range+20){
      en.hp-=dmg;en.flash=.3;en.shk=.25;
      fx(en.x,en.y,'#c00',6,80,5);
      if(en.hp<=0){
        en.dead=true;
        if(en.type===EN.WOLF)P.inv.add('hide',rng(1,2));
        if(en.type===EN.SKEL){P.inv.add('bone',rng(1,3));P.inv.add('stone',rng(0,2));}
        if(en.type===EN.GOB){P.inv.add('fiber',rng(1,3));P.inv.add('food',rng(0,2));}
        xpGain(12);fx(en.x,en.y,'#FFD700',14,120,7);note(en.name+' tué!');
      }
    }
  }
}

function doGather(map){
  const tx=Math.round((P.x+P.facing.x*T*1.1)/T),ty=Math.round((P.y+P.facing.y*T*1.1)/T);
  const e=map.entAt(tx,ty),tool=P.inv.cur();
  if(!e)return;
  let dmg=1,ok=false;
  if(e.type===ET.TREE||e.type===ET.PINE){if(tool?.id!=='axe'){note('Besoin d\'une hache!');return;}dmg=2;ok=true;}
  else if(e.type===ET.ROCK||e.type===ET.BROCK){if(tool?.id!=='pickaxe'){note('Besoin d\'une pioche!');return;}dmg=2;ok=true;}
  else if(e.type===ET.BUSH){dmg=1;ok=true;}
  if(!ok)return;
  e.hp-=dmg;e.shk=.2;
  fx(e.x*T+T/2,e.y*T+T/2,e.type===ET.BUSH?'#3d7a1a':'#8B4513',4,60,5);
  if(e.hp<=0){
    e.dead=true;fx(e.x*T+T/2,e.y*T+T/2,'#FFD700',10,100,7);
    if(e.type===ET.TREE){const n=rng(3,6);P.inv.add('wood',n);note('+'+n+' Bois');}
    if(e.type===ET.PINE){const n=rng(2,5);P.inv.add('wood',n);note('+'+n+' Bois');}
    if(e.type===ET.ROCK){const n=rng(2,5);P.inv.add('stone',n);note('+'+n+' Pierre');}
    if(e.type===ET.BROCK){const n=rng(4,9);P.inv.add('stone',n);note('+'+n+' Pierre');}
    if(e.type===ET.BUSH){const f=rng(1,3),fd=rng(0,2);P.inv.add('fiber',f);if(fd>0)P.inv.add('food',fd);note('+'+f+' Fibre'+(fd>0?', +'+fd+' Baies':''));}
  }
  P.ac=P.ar;
}

function xpGain(n){
  P.xp+=n;
  if(P.xp>=P.xpn){P.lv++;P.xp-=P.xpn;P.xpn=Math.floor(P.xpn*1.5);P.mhp+=15;P.hp=P.mhp;note('Niveau '+P.lv+'! +15 HP');fx(P.x,P.y,'#FFD700',20,150,8);}
}

function place(map){
  const wx=cam.x+Mouse.x,wy=cam.y+Mouse.y;
  const tx=Math.floor(wx/T),ty=Math.floor(wy/T);
  if(tx<1||ty<1||tx>=map.w-1||ty>=map.h-1)return;
  if(map.entAt(tx,ty)){note('Obstrué!');return;}
  if(map.strAt(tx,ty)){note('Déjà construit!');return;}
  if(map.tiles[ty]?.[tx]===TL.WATER){note('Impossible sur l\'eau!');return;}
  const item=P.inv.cur();if(!item||item.id!==bmode){bmode=null;return;}
  const st=bmode==='wall_item'?ST.WALL:bmode==='floor_item'?ST.FLOOR:ST.FIRE;
  map.structs.push({x:tx,y:ty,type:st});P.inv.rem(bmode,1);
  if(P.inv.cnt(bmode)===0){bmode=null;note('Plus de matériaux!');}
}

function chkTrans(map){
  const m=T*.7;let nid=null,nx=P.x,ny=P.y;
  if(P.x<m&&map.exits.west!=null){nid=map.exits.west;nx=(map.w-2)*T;}
  else if(P.x>(map.w)*T-m&&map.exits.east!=null){nid=map.exits.east;nx=T*2;}
  else if(P.y<m&&map.exits.north!=null){nid=map.exits.north;ny=(map.h-2)*T;}
  else if(P.y>(map.h)*T-m&&map.exits.south!=null){nid=map.exits.south;ny=T*2;}
  if(nid!=null){mapId=nid;P.x=nx;P.y=ny;note('Zone: '+(BNAME[maps[nid].biome]??'?'));}
}

function updEnemies(dt){
  const map=cm();
  for(const en of map.enemies){
    if(en.dead)continue;
    en.flash=Math.max(0,en.flash-dt*3);en.shk=Math.max(0,en.shk-dt*4);en.ac=Math.max(0,en.ac-dt);
    const dx=P.x-en.x,dy=P.y-en.y,dist=vlen(dx,dy);
    if(dist<en.agro){
      const[nx,ny]=vnorm(dx,dy),spd=en.spd*dt;
      const ex=en.x+nx*spd,ey=en.y+ny*spd;
      const map2=cm();
      if(map2.walk(ex,en.y))en.x=ex;if(map2.walk(en.x,ey))en.y=ey;
      if(dist<50&&en.ac===0){P.hp=Math.max(0,P.hp-en.dmg);en.ac=en.ar;fx(P.x,P.y,'#c00',4,70,4);}
    } else {
      en.wt-=dt;
      if(en.wt<=0){const a=Math.random()*Math.PI*2;en.wx=Math.cos(a);en.wy=Math.sin(a);en.wt=rng(2,5);}
      const spd=en.spd*.35*dt,map2=cm();
      const ex=en.x+en.wx*spd,ey=en.y+en.wy*spd;
      if(map2.walk(ex,en.y))en.x=ex;if(map2.walk(en.x,ey))en.y=ey;
    }
  }
}

// ── RENDER ────────────────────────────────────────────────
const GCOL={
  [TL.GRASS]:['#2a4e14','#325818','#3a6620','#264810'],
  [TL.DARK]: ['#182e0a','#1e3810','#142808'],
  [TL.DIRT]: ['#624210','#704e18','#58380c'],
  [TL.WATER]:['#0c3e60','#104870','#0a3452'],
  [TL.STONE]:['#424242','#4c4c4c','#383838'],
  [TL.SNOW]: ['#b8d0ea','#c4daf4','#aac8e0'],
};

function render(){
  ctx.clearRect(0,0,CW,CH);
  const map=cm();
  ctx.save();ctx.translate(-cam.x,-cam.y);

  const sx=Math.max(0,Math.floor(cam.x/T)),sy=Math.max(0,Math.floor(cam.y/T));
  const ex=Math.min(map.w,sx+Math.ceil(CW/T)+2),ey=Math.min(map.h,sy+Math.ceil(CH/T)+2);

  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++)dTile(x,y,map.tiles[y][x]);
  for(const s of map.structs)if(s.type===ST.FLOOR)dStruct(s);

  // Y-sorted depth rendering
  const dl=[];
  for(const e of map.ents)if(!e.dead)dl.push({y:e.y*T+T,fn:()=>dEnt(e)});
  for(const en of map.enemies)if(!en.dead)dl.push({y:en.y,fn:()=>dEnemy(en)});
  dl.push({y:P.y,fn:dPlayer});
  for(const s of map.structs)if(s.type!==ST.FLOOR)dl.push({y:s.y*T+T,fn:()=>dStruct(s)});
  dl.sort((a,b)=>a.y-b.y);
  for(const d of dl)d.fn();

  for(const p of PARTS){ctx.globalAlpha=Math.max(0,p.life/p.ml);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,Math.PI*2);ctx.fill();}

function dNight(){
  let a=0;
  if(day<.22)a=.68;else if(day<.32)a=.68-(day-.22)/.1*.68;
  else if(day<.68)a=0;else if(day<.78)a=(day-.68)/.1*.68;else a=.68;
  if(a>.01){
    ctx.fillStyle=`rgba(2,5,28,${a})`;ctx.fillRect(0,0,CW,CH);
    if(a>.3){ctx.fillStyle=`rgba(255,255,200,${a*.5})`;for(let i=0;i<35;i++){ctx.fillRect((Math.sin(i*23.7)*CW+CW)/2,(Math.cos(i*17.3)*CH+CH)/2,1.5,1.5);}}
  }
  const vg=ctx.createRadialGradient(CW/2,CH/2,CW*.2,CW/2,CH/2,CW*.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.48)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);
  const h=Math.floor(day*24),m=Math.floor((day*24-h)*60),isD=day>.25&&day<.75;

  ctx.font='bold 14px Courier New';ctx.textAlign='center';
  ctx.fillText((isD?'☀ ':'☽ ')+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'),CW/2,22);
}

}

    case 'axe':ctx.fillStyle='#5e3010';ctx.fillRect(-s*.15,-s*.8,s*.3,s*1.6);ctx.fillStyle='#aaa';ctx.beginPath();ctx.moveTo(s*.15,-s*.8);ctx.lineTo(s*.9,-s*.5);ctx.lineTo(s*.7,s*.1);ctx.lineTo(s*.15,0);ctx.closePath();ctx.fill();break;
    case 'pickaxe':ctx.fillStyle='#5e3010';ctx.fillRect(-s*.15,-s*.7,s*.3,s*1.4);ctx.fillStyle='#bbb';ctx.fillRect(-s*.9,-s*.9,s*1.8,s*.45);ctx.fillRect(-s*.9,-s*.9,s*.45,s*.8);ctx.fillRect(s*.45,-s*.9,s*.45,s*.8);break;
    case 'sword':ctx.fillStyle='#5e3010';ctx.fillRect(-s*.15,s*.1,s*.3,s*.8);ctx.fillStyle='#888';ctx.fillRect(-s*.6,-s*.05,s*1.2,s*.3);ctx.fillStyle='#c8cce8';ctx.fillRect(-s*.15,-s*.9,s*.3,s*1.1);break;
    case 'wall_item':ctx.fillStyle='#3c2806';ctx.fillRect(-s*.85,-s*.85,s*1.7,s*1.7);ctx.fillStyle='#5e4010';ctx.fillRect(-s*.7,-s*.6,s*1.4,s*.35);ctx.fillRect(-s*.7,0,s*1.4,s*.35);break;
    case 'floor_item':ctx.fillStyle='#7a4e06';ctx.fillRect(-s*.85,-s*.85,s*1.7,s*1.7);ctx.strokeStyle='#5c3a04';ctx.lineWidth=1;ctx.strokeRect(-s*.6,-s*.6,s*1.2,s*1.2);break;
    case 'campfire_item':ctx.fillStyle='#3a3a3a';ctx.beginPath();ctx.arc(0,s*.3,s*.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FF4000';ctx.beginPath();ctx.moveTo(0,-s*.8);ctx.lineTo(s*.5,s*.2);ctx.lineTo(-s*.5,s*.2);ctx.closePath();ctx.fill();ctx.fillStyle='#FFD700';ctx.beginPath();ctx.moveTo(0,-s*.45);ctx.lineTo(s*.25,s*.2);ctx.lineTo(-s*.25,s*.2);ctx.closePath();ctx.fill();break;
  }
  ctx.restore();
}

function dHotbar(){
  const N=8,sz=54,pad=4,tw=N*sz+(N-1)*pad;
  const sx=CW/2-tw/2,sy=CH-72;
  ctx.fillStyle='rgba(0,0,0,.72)';rr(sx-8,sy-6,tw+16,sz+16,8);ctx.fill();
  ctx.strokeStyle='rgba(90,70,30,.6)';ctx.lineWidth=1.5;rr(sx-8,sy-6,tw+16,sz+16,8);ctx.stroke();
  for(let i=0;i<N;i++){
    const x=sx+i*(sz+pad),sel=i===P.inv.sel;
    ctx.fillStyle=sel?'rgba(255,200,50,.2)':'rgba(18,16,28,.82)';rr(x,sy,sz,sz,5);ctx.fill();
    ctx.strokeStyle=sel?'#FFD700':'rgba(75,60,30,.75)';ctx.lineWidth=sel?2.5:1;rr(x,sy,sz,sz,5);ctx.stroke();
    const sl=P.inv.s[i];
    if(sl){icoItem(sl.id,x+5,sy+5,sz-10,sz-10);if(sl.qty>1){ctx.fillStyle='#fff';ctx.font='bold 11px Courier New';ctx.textAlign='right';ctx.fillText(sl.qty,x+sz-3,sy+sz-3);}}
    ctx.fillStyle='rgba(180,160,110,.55)';ctx.font='9px Courier New';ctx.textAlign='center';ctx.fillText(i+1,x+sz/2,sy+sz+13);
  }
}

function dJoy(){
  if(!JOY.on)return;
  ctx.save();ctx.globalAlpha=.5;
  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(JOY.bx,JOY.by,JOY.R,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.arc(JOY.bx,JOY.by,JOY.R,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=.8;
  const tx=JOY.bx+JOY.dx*JOY.R,ty=JOY.by+JOY.dy*JOY.R;
  ctx.fillStyle='rgba(255,255,255,.65)';ctx.beginPath();ctx.arc(tx,ty,22,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx,ty,22,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function dBtns(){
  // Attack
  const ax=ATK.x,ay=ATK.y,ar=ATK.r;
  ctx.save();ctx.globalAlpha=ATK.on?.95:.78;
  const ag=ctx.createRadialGradient(ax,ay,0,ax,ay,ar);
  ag.addColorStop(0,ATK.on?'rgba(255,70,20,.95)':'rgba(190,40,15,.82)');
  ag.addColorStop(1,'rgba(90,15,8,.65)');
  ctx.fillStyle=ag;ctx.beginPath();ctx.arc(ax,ay,ar,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=ATK.on?'rgba(255,130,80,.9)':'rgba(180,60,30,.75)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(ax,ay,ar,0,Math.PI*2);ctx.stroke();
  ctx.save();ctx.translate(ax,ay);
  ctx.fillStyle='rgba(255,255,255,.88)';ctx.fillRect(-3,ar*.35,6,ar*.38);
  ctx.fillStyle='rgba(195,210,255,.88)';ctx.fillRect(-3,-ar*.48,6,ar*.88);
  ctx.fillStyle='rgba(160,160,160,.8)';ctx.fillRect(-ar*.28,-ar*.04,ar*.56,ar*.14);
  ctx.restore();
  ctx.globalAlpha=1;ctx.fillStyle='rgba(255,255,255,.65)';ctx.font='bold 11px Courier New';ctx.textAlign='center';
  ctx.fillText('ATK',ax,ay+ar+17);ctx.restore();

  // Gather E button
  const gx=ATK.x-128,gy=ATK.y,gr=38;
  ctx.save();ctx.globalAlpha=EBTN.on?.92:.72;
  ctx.fillStyle='rgba(25,80,25,.8)';ctx.beginPath();ctx.arc(gx,gy,gr,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(60,160,60,.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(gx,gy,gr,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 13px Courier New';ctx.textAlign='center';
  ctx.fillText('E',gx,gy+5);ctx.globalAlpha=1;ctx.restore();

  // Bag button
  const bx2=ATK.x-212,by2=ATK.y+14,br=28;
  ctx.save();ctx.globalAlpha=.68;
  ctx.fillStyle='rgba(25,25,80,.8)';ctx.beginPath();ctx.arc(bx2,by2,br,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(60,60,160,.7)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(bx2,by2,br,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='bold 10px Courier New';ctx.textAlign='center';
  ctx.fillText('SAC',bx2,by2+4);ctx.globalAlpha=1;ctx.restore();
}

function dMini(map){
  const mm=105,mx=CW-mm-10,my=10;
  ctx.fillStyle='rgba(0,0,0,.78)';rr(mx-2,my-2,mm+4,mm+18,6);ctx.fill();
  ctx.strokeStyle='rgba(90,70,30,.6)';ctx.lineWidth=1;rr(mx-2,my-2,mm+4,mm+18,6);ctx.stroke();
  const ts=mm/map.w;
  for(let y=0;y<map.h;y++)for(let x=0;x<map.w;x++){
    const t=map.tiles[y][x];
    ctx.fillStyle=t===TL.WATER?'#0c3e60':t===TL.SNOW?'#b8d0ea':t===TL.STONE?'#424242':t===TL.DARK?'#182e0a':'#2a4e14';
    ctx.fillRect(mx+x*ts,my+y*ts,Math.ceil(ts),Math.ceil(ts));
  }
  for(const s of map.structs){ctx.fillStyle=s.type===ST.FLOOR?'#7a4e06':'#3e2e06';ctx.fillRect(mx+s.x*ts,my+s.y*ts,Math.max(2,ts),Math.max(2,ts));}
  for(const en of map.enemies){if(en.dead)continue;ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(mx+en.x/T*ts,my+en.y/T*ts,2,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(mx+P.x/T*ts,my+P.y/T*ts,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(210,190,120,.8)';ctx.font='10px Courier New';ctx.textAlign='center';
  ctx.fillText(BNAME[map.biome]??'Zone',mx+mm/2,my+mm+13);
}

function dDirs(map){
  ctx.font='12px Courier New';ctx.fillStyle='rgba(210,190,130,.62)';
  if(map.exits.north!=null){ctx.textAlign='center';ctx.fillText('▲ '+(BNAME[maps[map.exits.north]?.biome]??'?'),CW/2,40);}
  if(map.exits.south!=null){ctx.textAlign='center';ctx.fillText('▼ '+(BNAME[maps[map.exits.south]?.biome]??'?'),CW/2,CH-6);}
  if(map.exits.west!=null){ctx.textAlign='left';ctx.fillText('◄ '+(BNAME[maps[map.exits.west]?.biome]??'?'),6,CH/2);}
  if(map.exits.east!=null){ctx.textAlign='right';ctx.fillText((BNAME[maps[map.exits.east]?.biome]??'?')+' ►',CW-6,CH/2);}
}

function dNotif(){
  const fade=Math.min(1,notif.ti/.45);
  ctx.save();ctx.globalAlpha=fade;ctx.font='bold 16px Courier New';ctx.textAlign='center';
  const tw=ctx.measureText(notif.txt).width,nx=CW/2-tw/2-14,ny=CH/2-85;
  ctx.fillStyle='rgba(0,0,0,.8)';rr(nx,ny,tw+28,32,6);ctx.fill();
  ctx.strokeStyle='rgba(255,200,50,.7)';ctx.lineWidth=1.5;rr(nx,ny,tw+28,32,6);ctx.stroke();
  ctx.fillStyle='#FFD700';ctx.fillText(notif.txt,CW/2,ny+21);ctx.restore();
}

function dInv(){
  const iw=430,ih=415,ix=CW/2-iw/2,iy=CH/2-ih/2,sz=52,pad=5;
  ctx.fillStyle='rgba(5,7,18,.97)';rr(ix,iy,iw,ih,10);ctx.fill();
  ctx.strokeStyle='rgba(90,70,30,.8)';ctx.lineWidth=2;rr(ix,iy,iw,ih,10);ctx.stroke();
  ctx.fillStyle='#c8a040';ctx.font='bold 15px Courier New';ctx.textAlign='center';ctx.fillText('— INVENTAIRE —',CW/2,iy+26);
  for(let i=0;i<24;i++){
    const col=i%6,row=Math.floor(i/6),sx2=ix+18+col*(sz+pad),sy2=iy+38+row*(sz+pad),sel=i===P.inv.sel;
    ctx.fillStyle=sel?'rgba(255,200,50,.15)':'rgba(14,16,30,.85)';rr(sx2,sy2,sz,sz,4);ctx.fill();
    ctx.strokeStyle=sel?'#FFD700':'rgba(65,55,25,.8)';ctx.lineWidth=sel?2:1;rr(sx2,sy2,sz,sz,4);ctx.stroke();
    if(i<8){ctx.fillStyle='rgba(255,200,50,.18)';ctx.fillRect(sx2,sy2,11,11);ctx.fillStyle='rgba(190,150,28,.8)';ctx.font='7px Courier New';ctx.textAlign='left';ctx.fillText(i+1,sx2+2,sy2+9);}
    const sl=P.inv.s[i];
    if(sl){icoItem(sl.id,sx2+6,sy2+6,sz-12,sz-12);if(sl.qty>1){ctx.fillStyle='#fff';ctx.font='bold 10px Courier New';ctx.textAlign='right';ctx.fillText(sl.qty,sx2+sz-3,sy2+sz-3);}}
  }
  ctx.fillStyle='rgba(170,150,90,.55)';ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText('[I] Fermer',CW/2,iy+ih-10);
}

function dCraft(){
  const cw2=470,ch2=RECIPES.length*74+65,cx=CW/2-cw2/2,cy=CH/2-ch2/2;
  ctx.fillStyle='rgba(5,7,18,.97)';rr(cx,cy,cw2,ch2,10);ctx.fill();
  ctx.strokeStyle='rgba(90,70,30,.8)';ctx.lineWidth=2;rr(cx,cy,cw2,ch2,10);ctx.stroke();
  ctx.fillStyle='#c8a040';ctx.font='bold 15px Courier New';ctx.textAlign='center';ctx.fillText('— FABRICATION —',CW/2,cy+26);
  for(let i=0;i<RECIPES.length;i++){
    const r=RECIPES[i],ry=cy+42+i*74;
    let ok=true;for(const[id,q] of Object.entries(r.needs))if(P.inv.cnt(id)<q){ok=false;break;}
    ctx.fillStyle=ok?'rgba(8,38,8,.75)':'rgba(38,8,8,.55)';rr(cx+10,ry,cw2-20,64,5);ctx.fill();
    ctx.strokeStyle=ok?'rgba(45,155,45,.55)':'rgba(75,25,25,.5)';ctx.lineWidth=1;rr(cx+10,ry,cw2-20,64,5);ctx.stroke();
    icoItem(r.result,cx+16,ry+12,40,40);
    const def=ITEMS[r.result];
    ctx.fillStyle=ok?'#ddd':'#777';ctx.font='bold 13px Courier New';ctx.textAlign='left';
    ctx.fillText((def?.name??r.result)+' ×'+r.qty,cx+64,ry+22);
    ctx.font='11px Courier New';let nx2=cx+64;
    for(const[id,q] of Object.entries(r.needs)){const h=P.inv.cnt(id);ctx.fillStyle=h>=q?'#2ecc71':'#e74c3c';ctx.fillText((ITEMS[id]?.name??id)+': '+h+'/'+q,nx2,ry+44);nx2+=115;}
    if(ok){
      const bx=cx+cw2-100,by=ry+16,hov=Mouse.x>=bx&&Mouse.x<=bx+80&&Mouse.y>=by&&Mouse.y<=by+32;
      ctx.fillStyle=hov?'#4cd964':'#2ecc71';rr(bx,by,80,32,5);ctx.fill();
      ctx.fillStyle='#000';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.fillText('Fabriquer',bx+40,by+20);
      if(hov&&Mouse.jd){for(const[id,q] of Object.entries(r.needs))P.inv.rem(id,q);P.inv.add(r.result,r.qty);note('Fabriqué: '+(def?.name)+' ×'+r.qty);}
    }
  }
  ctx.fillStyle='rgba(170,150,90,.55)';ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText('[C] Fermer',CW/2,cy+ch2-10);
}

// ── LOOP ──────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-lt)/1000,.1);lt=ts;
  update(dt);render();requestAnimationFrame(loop);
}

mkWorld();
P.inv.add('axe',1);P.inv.add('wood',12);P.inv.add('stone',6);
requestAnimationFrame(ts=>{lt=ts;requestAnimationFrame(loop);});
</script>
